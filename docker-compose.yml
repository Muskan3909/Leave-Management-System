version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: leave-management-backend
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_PATH: ./database/leave_management.db
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      JWT_EXPIRES_IN: 8h
      CLIENT_ORIGIN: http://localhost:5173
    volumes:
      # Persist the SQLite file across container restarts/rebuilds.
      - backend_data:/app/database
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: leave-management-frontend
    ports:
      - '5173:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
